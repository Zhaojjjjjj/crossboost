name: Docker Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [crossboost-ai, crossboost-server, crossboost-web]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'crossboost-web' && './web' || './backend' }}
          file: ${{ matrix.service == 'crossboost-web' && './web/Dockerfile' || format('./backend/apps/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: crossboost/${{ matrix.service }}:latest
