<!DOCTYPE html>
<html lang="zh">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#root { width: 100%; height: 100%; }

/* ── Scene backgrounds ── */
.scene { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.scene-dark { background: linear-gradient(135deg, #0c1929 0%, #0f2847 40%, #0c1929 100%); }
.scene-gradient { background: linear-gradient(160deg, #0c1929 0%, #163a5f 50%, #1a6b3c 100%); }
.scene-analytic { background: linear-gradient(180deg, #0c1929 0%, #111d2e 100%); }
.scene-cta { background: linear-gradient(160deg, #0c1929 0%, #1e3a8a 60%, #0c1929 100%); }

/* ── Transitions ── */
.anim { opacity: 0; transform: translateY(20px); transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1); }

/* ── Typography ── */

/* ── Progress bar animation ── */
.progress-bar-fill { transition: width 1s cubic-bezier(0.16,1,0.3,1); }

<body>
<div id="root"></div>
<script type="text/babel">
const { createContext, useContext, useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════════
   ANIMATION ENGINE (Stage + Sprite)
   ═══════════════════════════════════════════════════ */
const TimeCtx = createContext({ time: 0, duration: 90, playing: false });
const SpriteCtx = createContext(null);

const Easing = {
  linear: t => t,
  easeIn: t => t * t,
  easeOut: t => 1 - (1 - t) * (1 - t),
  easeInOut: t => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2,
  expoOut: t => t === 1 ? 1 : 1 - Math.pow(2, -10 * t),
  overshoot: t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  spring: t => { const c=(2*Math.PI)/3; return t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c)+1; },
};

function interpolate(t, input, output, easing) {
  const [i0, i1] = input, [o0, o1] = output;
  if (t <= i0) return o0;
  if (t >= i1) return o1;
  let p = (t - i0) / (i1 - i0);
  if (easing) p = easing(p);
  return o0 + (o1 - o0) * p;
}

function useTime() { return useContext(TimeCtx).time; }
function useSprite() { return useContext(SpriteCtx) || { t:0, elapsed:0, duration:0 }; }

/* ── Stage ── */
function Stage({ duration=90, width=1920, height=1080, children, bgColor='#0c1929' }) {
  const [time, setTime] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [scale, setScale] = useState(1);
  const rafRef = useRef(null);
  const lastRef = useRef(null);
  const effectiveLoop = (typeof window !== 'undefined' && window.__recording) ? false : true;

  useEffect(() => {
    function resize() {
      const s = Math.min(window.innerWidth / width, (window.innerHeight - 56) / height);
      setScale(s);
    }
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, [width, height]);

  useEffect(() => {
    if (!playing) return;
    let cancelled = false;
    function tick(now) {
      if (cancelled) return;
      if (lastRef.current === null) { lastRef.current = now; window.__ready = true; }
      const dt = (now - lastRef.current) / 1000;
      lastRef.current = now;
      setTime(prev => {
        let next = prev + dt;
        if (next >= duration) { next = effectiveLoop ? 0 : duration - 0.001; }
        return next;
      });
      rafRef.current = requestAnimationFrame(tick);
    }
    const go = () => { if (!cancelled) rafRef.current = requestAnimationFrame(tick); };
    document.fonts && document.fonts.ready ? document.fonts.ready.then(go) : go();
    return () => { cancelled = true; cancelAnimationFrame(rafRef.current); };
  }, [playing, duration, effectiveLoop]);

  const handleSeek = useCallback(e => {
    const r = e.currentTarget.getBoundingClientRect();
    setTime(Math.max(0, Math.min(duration, ((e.clientX - r.left) / r.width) * duration)));
    setPlaying(false);
  }, [duration]);

  const progress = time / duration;
  const ctx = { time, duration, playing, setPlaying, setTime };

  return (
    <TimeCtx.Provider value={ctx}>
      <div style={{ position:'fixed', inset:0, background:'#000', display:'flex', flexDirection:'column', fontFamily:"-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" }}>
        <div style={{ flex:1, position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:'50%', left:'50%', transformOrigin:'center center', width, height, background:bgColor, transform:`translate(-50%,-50%) scale(${scale})`, overflow:'hidden' }}>
            {children}
          </div>
        </div>
        <div className="no-record" style={{ position:'fixed', bottom:0, left:0, right:0, background:'rgba(0,0,0,0.85)', backdropFilter:'blur(10px)', padding:'12px 20px', display:'flex', alignItems:'center', gap:16, color:'#fff', fontSize:12, zIndex:100 }}>
          <button style={{ background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff', padding:'6px 14px', borderRadius:4, cursor:'pointer', fontSize:12 }} onClick={() => setPlaying(p=>!p)}>{playing?'⏸':'▶'}</button>
          <button style={{ background:'none', border:'1px solid rgba(255,255,255,0.3)', color:'#fff', padding:'6px 14px', borderRadius:4, cursor:'pointer', fontSize:12 }} onClick={() => { setTime(0); lastRef.current=null; }}>⏮</button>
          <span style={{ fontFamily:'ui-monospace,monospace', fontVariantNumeric:'tabular-nums', minWidth:100 }}>{time.toFixed(2)}s / {duration.toFixed(2)}s</span>
          <div style={{ flex:1, height:4, background:'rgba(255,255,255,0.2)', borderRadius:2, position:'relative', cursor:'pointer' }} onMouseDown={handleSeek}>
            <div style={{ position:'absolute', top:0, left:0, height:'100%', width:`${progress*100}%`, background:'#fff', borderRadius:2, pointerEvents:'none' }} />
            <div style={{ position:'absolute', top:'50%', left:`${progress*100}%`, width:12, height:12, background:'#fff', borderRadius:'50%', transform:'translate(-50%,-50%)', pointerEvents:'none' }} />
          </div>
        </div>
      </div>
    </TimeCtx.Provider>
  );
}

/* ── Sprite ── */
function Sprite({ start=0, end, children, style }) {
  const { time } = useContext(TimeCtx);
  const actualEnd = end == null ? Infinity : end;
  if (time < start || time >= actualEnd) return null;
  const dur = actualEnd - start;
  const t = dur === 0 ? 1 : Math.max(0, Math.min(1, (time - start) / dur));
  return <SpriteCtx.Provider value={{ t, elapsed: time-start, duration:dur, start, end:actualEnd }}>
    <div style={{ position:'absolute', inset:0, ...style }}>{children}</div>
  </SpriteCtx.Provider>;
}

/* ═══════════════════════════════════════════════════
   COLOR PALETTE
   ═══════════════════════════════════════════════════ */
const C = {

/* ═══════════════════════════════════════════════════
   SCENE 1 · THE PROBLEM (0–15s)
   ═══════════════════════════════════════════════════ */

        </div>

          <div className="t-mono" style={{ fontSize:42, fontWeight:700, color:C.red, lineHeight:1 }}>3–5d</div>

        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   SCENE 2 · THE SOLUTION (15–30s)
   ═══════════════════════════════════════════════════ */

            </div>

          <svg width="48" height="48" fill="none" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke={C.primaryLight} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>

/* ═══════════════════════════════════════════════════
   SCENE 3 · THREE CAPABILITIES (30–45s)
   ═══════════════════════════════════════════════════ */
function Scene3() {
