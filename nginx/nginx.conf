user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    client_max_body_size 50m;

    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;

    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept, Accept-Encoding, Accept-Language, Authorization, Cache-Control, Content-Type, Origin, Referer, User-Agent, X-Requested-With, X-API-Key" always;
    add_header Access-Control-Max-Age 86400 always;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;

    proxy_connect_timeout 120s;
    proxy_send_timeout 60s;
    proxy_read_timeout 86400s;

    server {
        listen 80;
        server_name _;

        location = /_nhealth {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # AI service routes
        location /api/ai/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://crossboost-ai:3010;
        }

        location /api/agent/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://crossboost-ai:3010;
        }

        # Business server routes
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://crossboost-server:3002;
        }

        # S3 storage proxy
        location /oss/ {
            proxy_pass http://crossboost-rustfs:9000/crossboost/;
        }

        # Frontend
        location / {
            proxy_pass http://crossboost-web:3000;
        }
    }

    # S3 upload proxy
    server {
        listen 9000;
        listen [::]:9000;
        server_name _;

        client_max_body_size 500m;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, PUT, POST, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers * always;
        add_header Access-Control-Expose-Headers "ETag" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        location / {
            proxy_pass http://crossboost-rustfs:9000;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
